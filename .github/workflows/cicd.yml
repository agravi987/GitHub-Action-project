# Name of the workflow (visible in GitHub Actions UI)
name: CICD pipeline 

# Trigger: this pipeline runs when code is pushed to main branch
on:
  push:
    branches: [ "main" ]

jobs:
  # First job: Compile the application
  compile:

    # Runner environment (GitHub-hosted VM)
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout code from repository
    - uses: actions/checkout@v4

    # Step 2: Setup Java environment (JDK 17)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'          # Java version
        distribution: 'temurin'    # OpenJDK distribution
        cache: maven               # Cache Maven dependencies for faster builds

    # Step 3: Compile the project using Maven
    - name: Build with Maven
      run: mvn compile

      
  # Second job: Security checks
  security-checks:

    # Runs on Ubuntu runner
    runs-on: ubuntu-latest
    needs: compile

    steps:
    # Step 1: Checkout repository code
    - uses: actions/checkout@v4

    # Step 2: Install Trivy (security scanner for vulnerabilities)
    - name: Trivy Installation
      run: | 
        sudo apt-get install wget gnupg               # Install required packages
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
        echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
        sudo apt-get update                          # Update package list
        sudo apt-get install trivy                  # Install Trivy

    # Step 3: Scan filesystem for vulnerabilities
    - name: Trivy fs scan
      run: trivy fs --format table -o fs-report.json   # Output report in JSON format

    # Step 4: Install Gitleaks (detect secrets in code)
    - name: Gitleaks Installation
      run: sudo apt install gitleaks -y 

    # Step 5: Scan code for secrets (API keys, passwords, etc.)
    - name: Gitleaks Code Scan
      run: gitleaks detect source . -r gitleaks-report.json -f json
